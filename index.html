<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lead Entry | Mas Formation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .form-shadow {
        box-shadow:
          0 20px 25px -5px rgba(0, 0, 0, 0.05),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <!-- Centered Form Container -->
    <div class="w-full max-w-xl">
      <!-- Brand Logo/Header (Minimal) -->
      <div class="flex items-center justify-center gap-2 mb-8">
        <div
          class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200"
        >
          <span class="text-white font-bold text-xl">M</span>
        </div>
        <span class="text-2xl font-bold tracking-tight text-slate-800"
          >Mas Formation</span
        >
      </div>

      <!-- Main Form Card -->
      <div
        class="bg-white rounded-3xl p-8 md:p-10 form-shadow border border-slate-100"
      >
        <div class="mb-8 text-center">
          <h1 class="text-2xl font-bold text-slate-900">Lead Filing Form</h1>
          <p class="text-slate-500 mt-2">
            Please enter the business transaction details below.
          </p>
        </div>

        <form
          class="space-y-6"
          onsubmit="
            event.preventDefault();
            showSuccess();
          "
        >
          <!-- Business Volume -->
          <div>
            <label
              for="business-volume"
              class="block text-sm font-semibold text-slate-700 mb-2"
              >1. Business Volume (Monthly)</label
            >
            <div class="relative group">
              <span
                class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-blue-500 transition-colors"
                >$</span
              >
              <input
                type="number"
                id="business-volume"
                placeholder="e.g. 50,000"
                class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all"
                required
              />
            </div>
          </div>

          <!-- Approx Transaction -->
          <div>
            <label
              for="transactions"
              class="block text-sm font-semibold text-slate-700 mb-2"
              >2. Aprox. Transaction Count</label
            >
            <input
              type="number"
              id="transactions"
              placeholder="Total monthly transactions"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all"
              required
            />
          </div>

          <!-- Pricing Grid -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Single Member Price -->
            <div>
              <label
                for="single-price"
                class="block text-sm font-semibold text-slate-700 mb-2"
                >3. Single Member Price</label
              >
              <div class="relative group">
                <span
                  class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-blue-500 transition-colors"
                  >$</span
                >
                <input
                  type="number"
                  step="0.01"
                  id="single-price"
                  placeholder="0.00"
                  class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all"
                  required
                />
              </div>
            </div>

            <!-- Multiple Member Price -->
            <div>
              <label
                for="multiple-price"
                class="block text-sm font-semibold text-slate-700 mb-2"
                >4. Multiple Member Price</label
              >
              <div class="relative group">
                <span
                  class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-blue-500 transition-colors"
                  >$</span
                >
                <input
                  type="number"
                  step="0.01"
                  id="multiple-price"
                  placeholder="0.00"
                  class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all"
                  required
                />
              </div>
            </div>
          </div>

          <!-- Submit Button -->
          <div class="pt-4">
            <button
              type="submit"
              class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 px-6 rounded-xl transition-all transform active:scale-[0.98] shadow-xl shadow-slate-200 flex items-center justify-center gap-2"
            >
              Submit Filing
              <svg
                class="w-5 h-5 opacity-70"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M14 5l7 7m0 0l-7 7m7-7H3"
                ></path>
              </svg>
            </button>
          </div>
        </form>

        <!-- Success Message -->
        <div
          id="success-msg"
          class="hidden mt-6 p-4 bg-emerald-50 text-emerald-700 rounded-xl text-sm font-medium text-center border border-emerald-100 flex items-center justify-center gap-2"
        >
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
              clip-rule="evenodd"
            ></path>
          </svg>
          Filing submitted successfully!
        </div>
      </div>
    </div>

    <script>
      function showSuccess() {
        const msg = document.getElementById("success-msg");
        msg.classList.remove("hidden");
        // Reset form for next entry
        document.querySelector("form").reset();
        setTimeout(() => {
          msg.classList.add("hidden");
        }, 6000);
      }
    </script>
  </body>
</html>
