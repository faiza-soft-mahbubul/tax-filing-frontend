<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Filing Portal | Mas Formation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a;
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .tax-card {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background-color: #1e293b;
        }
        /* Remove arrows from number inputs */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-slate-200">

    <div class="w-full max-w-2xl">
        <!-- Official Header -->
        <div class="flex items-center justify-center mb-8">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-900/20">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                    </svg>
                </div>
                <div class="text-left">
                    <h2 class="text-2xl font-bold text-white uppercase tracking-tight">Mas Formation</h2>
                    <p class="text-sm font-semibold text-indigo-400 uppercase tracking-widest">Tax Filing Portal</p>
                </div>
            </div>
        </div>

        <!-- Main Form Card -->
        <div class="rounded-2xl tax-card border border-slate-700 overflow-hidden">
            <form class="p-8 md:p-10 space-y-8" onsubmit="event.preventDefault(); showSuccess();">
                <!-- Grid for main inputs -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                    
                    <!-- Business Volume -->
                    <div class="space-y-2">
                        <label for="business-volume" class="block text-xs font-bold text-slate-400 uppercase tracking-wider">1. Annual Business Volume</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none transition-colors group-focus-within:text-indigo-400">
                                <span class="text-slate-500 font-medium text-sm">$</span>
                            </div>
                            <input type="number" id="business-volume" placeholder="0.00" 
                                class="w-full pl-8 pr-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-sm text-white focus:bg-slate-800 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all placeholder:text-slate-600" required>
                        </div>
                    </div>

                    <!-- Approx Transaction -->
                    <div class="space-y-2">
                        <label for="transactions" class="block text-xs font-bold text-slate-400 uppercase tracking-wider">2. Transaction Count</label>
                        <input type="number" id="transactions" placeholder="Total count" 
                            class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-sm text-white focus:bg-slate-800 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all placeholder:text-slate-600" required>
                    </div>

                    <!-- Single Member Price -->
                    <div class="space-y-2">
                        <label for="single-price" class="block text-xs font-bold text-slate-400 uppercase tracking-wider">3. Single Member Price</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none transition-colors group-focus-within:text-indigo-400">
                                <span class="text-slate-500 font-medium text-sm">$</span>
                            </div>
                            <input type="number" step="0.01" id="single-price" placeholder="0.00" 
                                class="w-full pl-8 pr-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-sm text-white focus:bg-slate-800 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all placeholder:text-slate-600" required>
                        </div>
                    </div>

                    <!-- Multiple Member Price -->
                    <div class="space-y-2">
                        <label for="multiple-price" class="block text-xs font-bold text-slate-400 uppercase tracking-wider">4. Multi-Member Price</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none transition-colors group-focus-within:text-indigo-400">
                                <span class="text-slate-500 font-medium text-sm">$</span>
                            </div>
                            <input type="number" step="0.01" id="multiple-price" placeholder="0.00" 
                                class="w-full pl-8 pr-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-sm text-white focus:bg-slate-800 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all placeholder:text-slate-600" required>
                        </div>
                    </div>
                </div>

                <!-- Footer Action -->
                <div class="flex items-center justify-between pt-6 gap-4 border-t border-slate-700/50">
                    <button type="button" onclick="document.querySelector('form').reset()" class="text-xs font-bold text-slate-500 hover:text-slate-300 uppercase tracking-widest transition-colors">
                        Clear Fields
                    </button>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-10 rounded-xl text-xs uppercase tracking-[0.2em] shadow-lg shadow-indigo-900/40 transition-all transform active:scale-95">
                        Submit Filing
                    </button>
                </div>
            </form>
        </div>

        <!-- Minimal Footer -->
        <div class="mt-8 text-center">
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">© 2024 Mas Formation</p>
        </div>

        <!-- Success Notification -->
        <div id="success-msg" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-8 py-4 rounded-full shadow-2xl text-sm font-bold flex items-center gap-3 animate-bounce">
            <svg class="w-5 h-5 text-indigo-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            SUBMITTED SUCCESSFULLY
        </div>
    </div>

    <script>
        function showSuccess() {
            const msg = document.getElementById('success-msg');
            msg.classList.remove('hidden');
            document.querySelector('form').reset();
            setTimeout(() => {
                msg.classList.add('hidden');
            }, 5000);
        }
    </script>
</body>
</html>
